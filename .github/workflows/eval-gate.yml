name: RAG Eval Gate

on:
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RAGAS evaluation
        run: python phase-a/run_ragas_eval.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Check thresholds
        run: |
          python -c "
          import json
          import sys
          with open('phase-a/ragas_summary.json', 'r') as f:
              summary = json.load(f)
          
          thresholds = {
              'faithfulness': 0.75,
              'answer_relevancy': 0.70,
              'context_precision': 0.60,
              'context_recall': 0.65
          }
          
          failed = []
          for metric, threshold in thresholds.items():
              if summary[metric] < threshold:
                  failed.append(f'{metric}: {summary[metric]:.3f} < {threshold}')
          
          if failed:
              print('❌ Evaluation failed thresholds:')
              for f in failed:
                  print(f'  - {f}')
              sys.exit(1)
          else:
              print('✅ All metrics passed thresholds')
          "

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ragas-report
          path: |
            phase-a/ragas_results.csv
            phase-a/ragas_summary.json
